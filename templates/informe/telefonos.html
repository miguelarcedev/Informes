{% extends "base.html" %}

{% block contenido %}

<div class="row justify-content-center">

    <div class="m-3">

        <table id="customers">
            <tr>
                <th>Publicador</th>
                <th>Teléfono</th>

            </tr>
            {% for c in telefonos %}

                <td>{{c.nombre}}</td>
                <td>{{c.telefono}}</td>

            </tr>
            {% endfor %}
        </table>
    </div>
</div>


{% endblock %}
