{% extends "base.html" %}

{% block contenido %}
<div class="flex-container">
    <table id="customers">

        <tr>
            <th>IRREGULARES: {{cantidad}}</th>
            <th>Año</th>
            <th>Mes</th>

        </tr>

        {% for i in irregulares %}

        <tr>
            <td>{{i.0}}</td>
            <td>{{i.1}}</td>
            <td>{{i.2}}</td>
        </tr>

        {% endfor %}


    </table>
</div>

{% endblock %}
