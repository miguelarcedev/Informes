{% extends "base.html" %}

{% block contenido %}   
    <div class="container">
        <div class="contenedor-grid">
            <div class="elemento">
                <table id="customers" style="width:100%">
                    <tr>
                        <th colspan="2"> {{titulo}}  {{cantidad}}</th>
                        
                    </tr>
                    <tr>
                        <th>Publicador</th>
                        <th>Tarjeta</th>
                        
                    </tr>
    
                    {% for c in publicador %}
    
                        <tr>
                            <td class="small">{{c.nombre}}</td>
                            {% if estado == "Activo" %}
                                <td class="small"><a href="{% url 'tarjeta_activo' c.id %}"><i class="fa-sharp fa-solid fa-file-pdf fa-2xl" style="color:red;"></i></a></td>
                                
                            {% else %}
                                <td class="small"><a href="{% url 'tarjeta_inactivo' c.id %}"><i class="fa-sharp fa-solid fa-file-pdf fa-2xl" style="color:red;"></i></a></td>
                            {% endif %}
                        </tr>
                    {% endfor %}                        
                </table>
            </div>
    
            
        </div>
    </div>

    {% endblock %}
