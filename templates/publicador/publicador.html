{% extends "base.html" %}

{% block contenido %}   
    <div class="container">
        
        <table  class="table table-striped table-bordered" style="width:100%">
            <thead align="justify">
                <tr>
                    <th>{{ titulo }}{{cantidad}}</th>
                    
                </tr>
            </thead>
            <tbody>
                {% for publicador in publicador %}
                <tr>
                    <td class="small"><a href="{% url 'tarjeta' publicador.id %}">{{publicador.nombre}}</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
    {% endblock %}
