<!DOCTYPE html>
<html>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
<style>
    .img-invoice {
        width: 50px;
        text-align: center;
        margin: 0 auto;
    }
    
    
    .head {
        text-align: center;
        text-transform: uppercase;
    }

    #invoice thead tr th {
        text-align: center;
        border-bottom: 0px solid black;
        border-top: 0px solid black;
        padding-top: 4px;
    }

    #invoice thead tr {
        
        margin-bottom: 1;
        padding-bottom: 0;
    }

    #invoice tbody tr {
        padding: 0.3;
    }

    .text-center{
        text-align: center;
    }

    p.saltodepagina
        {
            page-break-after: always;
        }

    @page {
        /*size: a6 , landscape; /* para 12 registros */
        size: a4;
        @frame header_frame {
        left: 30pt;
        width: 520pt;
        top: 50pt;
        height: 20pt;
        
        }
        @frame content_frame {
        left: 30pt; width: 450pt; top: 70pt; height: 1000pt;
        }
        @frame footer_frame {
        -pdf-frame-content:footer_content;
        left: 30pt; width: 450pt; top: 772pt; height: 20pt;
        }
        
        
    }

</style>
<body>
    
    <table id="invoice" border="0.2">
        <thead>
            <tr>
                <th style="width: 4%;">N°</th>
                <th style="width: 32%;">GRUPO 1</th>
                <th style="width: 32%;">GRUPO 2</th>
                <th style="width: 32%;">GRUPO 3</th>
                
                
            </tr>
        </thead>
        
        <tbody>
            {% for grupo in grupos %}
                    <tr>
                            <td class="text-center">{{grupo.0}}</td>
                            <td class="text-center">{{grupo.1 }}</td>
                            <td class="text-center">{{grupo.2 }}</td>
                            <td class="text-center">{{grupo.3 }}</td>
                            
                    </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
