<!DOCTYPE html>
<html>
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
<style>
    .img-invoice {
        width: 50px;
        text-align: center;
        margin: 0 auto;
    }

    .head {
        text-align: center;
        text-transform: uppercase;
    }

    #invoice thead tr th {
        text-align: left;
        border-bottom: 1px solid black;
        border-top: 1px solid black;
        padding-top: 4px;
    }

    #invoice thead tr {
        margin-bottom: 0;
        padding-bottom: 0;
    }

    #invoice tbody tr {
        padding: 0;
    }

    .text-center{
        text-align: center;
    }

    @page {
        size: a6 , landscape;
        @frame header_frame {
        left: 15pt;
        width: 270pt;
        top: 20pt;
        height: 40pt;
        }
        @frame content_frame {
        left: 15pt; width: 370pt; top: 50pt; height: 100vh;
        }
        /* @frame footer_frame {
        -pdf-frame-content:footer_content;
        left: 15pt; width: 270pt; top: 772pt; height: 20pt;
        } */
    }



</style>
<body>

<p class="head">
    <h3>REGISTRO DE ASISTENCIA A LAS REUNIONES DE CONGREGACION</h3>
</p>
<p>
    <b>Reunión del fin de semana</b><br>
    
</p>
    
<table id="invoice">
    <thead>
    <tr>
        <th style="width: 10%;">Mes</th>
        <th style="width: 20%;">Cantidad</th>
        <th style="width: 10%;">Total</th>
        <th style="width: 10%;">Promedio</th>
        
    </tr>
    </thead>
    
    <tbody>
    {% for d in asistencia.all %}
        {% if d.año == 2022 %}
        <tr {% if forloop.first %}style="padding-top: 3px;" {% endif %}>
            
            <td class="text-center">{{ d.mes }}</td>
            <td class="text-center">{{ d.cantidad }}</td>
            <td class="text-center">{{ d.total }}</td>
            <td class="text-center">{{ d.promedio }}</td>
            
        </tr>
        {% endif %}
    
    {% endfor %}
        
    </tbody>
</table>

</body>
</html>
